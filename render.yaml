services:
  - type: web
    name: ratemyresume-web
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python -m spacy download en_core_web_sm
      python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn App.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    autoDeploy: true
    disk:
      name: media-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ratemyresume-web.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://ratemyresume-web.onrender.com
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: NPM_BIN_PATH
        value: npm
      - key: MEDIA_ROOT
        value: /var/data/media
      - key: DATABASE_URL
        fromDatabase:
          name: ratemyresume-db
          property: connectionString

databases:
  - name: ratemyresume-db
    plan: free
